# k8s/backend-service.yaml
# AWS NLB (Network Load Balancer) for the backend
#
# AWS creates a stable DNS name for this NLB automatically.
# After applying, run:
#   kubectl get svc car-backend -n autoelite
# Copy the EXTERNAL-IP (NLB DNS) and use it in .env.production:
#   REACT_APP_API_URL=http://<NLB-DNS>
# Then rebuild and push the frontend image.

apiVersion: v1
kind: Service
metadata:
  name: car-backend
  namespace: autoelite
  annotations:
    # AWS NLB — stable, high-performance, Layer 4
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    # Optional: restrict to internal VPC only (remove internet-facing above)
    # service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  selector:
    app: car-backend
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
