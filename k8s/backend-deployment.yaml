# k8s/backend-deployment.yaml
# ✅ Replace YOUR_AWS_ACCOUNT_ID, YOUR_REGION, and image tag

apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-backend
  namespace: autoelite
spec:
  replicas: 2                      # 2 pods across availability zones
  selector:
    matchLabels:
      app: car-backend
  template:
    metadata:
      labels:
        app: car-backend
    spec:
      containers:
        - name: car-backend

          # Using AWS ECR (Elastic Container Registry)
          # Format: <account-id>.dkr.ecr.<region>.amazonaws.com/<repo>:<tag>
          # ✅ Change to your ECR image URI
          image: YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/car-backend:latest

          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: autoelite-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: autoelite-config
                  key: NODE_ENV
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
