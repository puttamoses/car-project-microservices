# car-frontend/nginx.conf
# Nginx config for serving React app + proxying API calls to backend

server {
    listen 80;
    server_name _;

    # Serve React static files
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router (all routes → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ✅ Optional: Proxy /api/* calls to backend
    # Uncomment this block if you want frontend to call /api/... 
    # instead of http://backend-url/api/...
    # In that case set REACT_APP_API_URL="" (empty) at build time
    #
    # location /api/ {
    #     proxy_pass http://car-backend:5000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
